      - \item Complete: if $\frac{m}{5}=6\frac{2}{5}$, then $m=\rule{1.6cm}{0.15mm}$.
      - \item Convert $12\frac{7}{12}$ to an improper fraction.
      - \item Convert $\frac{58}{9}$ to a mixed number.

