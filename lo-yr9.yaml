year_level: 9
learning_objectives:
  - id: L01
    topic: Place Values and Decimals
    slug: lo-yr9-place-values-and-decimals
    instruction: Read, write, compare, or partition each number using place value.
    terminology:
      - place value
      - digit
      - ones
      - tenths
      - hundredths
      - decimal
    skills:
      - identify the value of a digit based on place
      - read and write whole numbers and decimals
      - compare and order numbers using place value
      - partition numbers into place-value parts
    question_types:
      - digit value
      - reading and writing numbers
      - comparing and ordering
      - partitioning

    foundation_questions:
      - \item 4 in $347$ has value \rule{1.6cm}{0.15mm}.
      - \item 6 in $862$ has value \rule{1.6cm}{0.15mm}.
      - \item 5 in $5.3$ has value \rule{1.6cm}{0.15mm}.
      - \item 7 in $2.74$ has value \rule{1.6cm}{0.15mm}.
      - \item Write in numerals: three hundred and six.
      - \item Write in numerals: nine hundred and forty-two.
      - \item Write in words: $508$.
      - \item Write in words: $3.6$.
      - \item Which is greater: $45$ or $54$?
      - \item Which is smaller: $0.8$ or $0.08$?
      - \item Order from smallest to largest: $3.2, 2.9, 3.02$.
      - \item Order from largest to smallest: $406, 460, 640$.
      - \item Partition $58$ into tens and ones.
      - \item Partition $407$ into hundreds, tens, and ones.
      - \item Partition $4.7$ into ones and tenths.
      - \item Partition $3.48$ into ones, tenths, and hundredths.

    proficient_questions:
      - \item State the value of the $8$ in $4,836$.
      - \item State the value of the $3$ in $7.34$.
      - \item State the value of the $9$ in $0.692$.
      - \item Write in words: $2,045$.
      - \item Write in words: $14.09$.
      - \item Write in numerals: six thousand and seventy-three.
      - \item Write in numerals: eight and five tenths.
      - \item Compare using $<$, $>$, or $=$: $5.07\ \square\ 5.7$.
      - \item Compare using $<$, $>$, or $=$: $0.43\ \square\ 0.403$.
      - \item Order from smallest to largest: $0.6, 0.06, 0.606, 0.66$.
      - \item Order from largest to smallest: $9.1, 9.01, 9.11, 8.99$.
      - \item Partition $5,302$ fully.
      - \item Partition $7.208$ into ones, tenths, hundredths, and thousandths.
      - \item Which digit is in the tenths place in $3.58$?
      - \item Which digit is in the hundreds place in $6,482$?
      - \item Fill in the blank: $4.3 = 4 + \frac{\square}{10}$.
      - \item Fill in the blank: $608 = 6 \times 100 + \square \times 10 + 8$.
      - \item Explain in one short sentence why $0.5 > 0.05$.

    excellence_questions:
      - \item A student says the $4$ in $0.48$ is worth $4$. Are they correct? Explain.
      - \item A student says $3.09 > 3.9$ because $09 > 9$. Are they correct? Explain.
      - \item Which is greater: $2.305$ or $2.35$? Show enough working to justify.
      - \item Which is smaller: $7.08$ or $7.8$? Explain how you know.
      - \item Write $5.406$ as the sum of its place-value parts.
      - \item Write $2,070$ as the sum of its place-value parts.
      - \item Fill in the blank: in $8.472$, the digit in the hundredths place is \rule{1.4cm}{0.15mm}.
      - \item Fill in the blank: $6.08 = 6 + \frac{\square}{100}$.
      - \item Complete: $4.5 = 4 + \frac{\square}{10} = \frac{45}{10}$.
      - \item Put in ascending order: $4.09, 4.9, 4.099, 4.19$.
      - \item Put in descending order: $12.3, 12.03, 12.300, 12.29$.
      - \item Which does not belong: $0.7, 0.70, 0.07, 0.700$?
      - \item A number has $3$ ones, $4$ tenths, and $7$ hundredths. Write the number.
      - \item A number has $5$ hundreds, $0$ tens, $8$ ones, and $2$ tenths. Write the number.
      - \item Explain why adding a zero to the end sometimes changes nothing and sometimes changes the value.
      - \item Write a number between $6.4$ and $6.5$ that has three decimal places.

  - id: L02
    topic: Rounding to Decimal Points
    slug: lo-yr9-rounding-to-decimal-points
    instruction: Round each decimal to the required number of decimal places.
    terminology:
      - rounding
      - decimal place
      - whole number
      - tenths
      - hundredths
    skills:
      - identify the place to round to
      - use the next digit to decide whether to round up
      - round decimals to whole numbers, tenths, and hundredths
      - justify rounding choices
    question_types:
      - direct rounding
      - fill in the blank
      - error check
      - comparison
      - short reasoning

    foundation_questions:
      - \item Round $3.4$ to the nearest whole number.
      - \item Round $7.6$ to the nearest whole number.
      - \item Round $2.31$ to 1 decimal place.
      - \item Round $5.68$ to 1 decimal place.
      - \item Round $9.24$ to 1 decimal place.
      - \item Round $4.86$ to 1 decimal place.
      - \item Round $1.73$ to 1 decimal place.
      - \item Round $6.15$ to 1 decimal place.
      - \item Round $8.42$ to 1 decimal place.
      - \item Round $0.27$ to 1 decimal place.
      - \item Round $3.141$ to 2 decimal places.
      - \item Round $5.678$ to 2 decimal places.
      - \item Round $7.204$ to 2 decimal places.
      - \item Round $9.995$ to 2 decimal places.
      - \item Round $12.49$ to the nearest whole number.
      - \item Round $12.50$ to the nearest whole number.

    proficient_questions:
      - \item Round $14.37$ to 1 decimal place.
      - \item Round $8.05$ to 1 decimal place.
      - \item Round $6.666$ to 2 decimal places.
      - \item Round $2.349$ to 2 decimal places.
      - \item Round $0.995$ to 2 decimal places.
      - \item Round $17.499$ to the nearest whole number.
      - \item Round $17.500$ to the nearest whole number.
      - \item Round $3.045$ to 2 decimal places.
      - \item Round $9.994$ to 2 decimal places.
      - \item Round $12.444$ to 2 decimal places.
      - \item Round $5.555$ to 2 decimal places.
      - \item Round $0.074$ to 1 decimal place.
      - \item Round $0.074$ to 2 decimal places.
      - \item Fill in the blank: $4.27 \approx 4.\square$ to 1 decimal place.
      - \item Fill in the blank: $8.196 \approx 8.\square\square$ to 2 decimal places.
      - \item Is $6.84 \to 6.9$ to 1 decimal place correct?
      - \item Is $3.141 \to 3.14$ to 2 decimal places correct?
      - \item Explain in one short sentence what digit decides the rounding.

    excellence_questions:
      - \item A student says $4.249$ rounds to $4.3$ to 1 decimal place. Are they correct? Explain.
      - \item A student says $7.995$ rounds to $7.99$ to 2 decimal places. Are they correct? Explain.
      - \item Which is greater after rounding to 1 decimal place: $6.44$ or $6.45$?
      - \item Which is smaller after rounding to 2 decimal places: $3.104$ or $3.099$?
      - \item Fill in the blank: a number that rounds to $5.7$ to 1 decimal place could be \rule{1.8cm}{0.15mm}.
      - \item Fill in the blank: a number that rounds to $2.35$ to 2 decimal places could be \rule{1.8cm}{0.15mm}.
      - \item Complete: $8.\square 4$ rounds to $8.5$ to 1 decimal place.
      - \item Complete: $3.4\square 8$ rounds to $3.45$ to 2 decimal places.
      - \item Round $19.995$ to 2 decimal places.
      - \item Round $0.999$ to 2 decimal places.
      - \item Round $12.049$ to 2 decimal places.
      - \item Round $4.444$ to 2 decimal places.
      - \item Put in order after rounding to 1 decimal place: $2.84, 2.85, 2.89$.
      - \item Write two different numbers that both round to $6.2$ to 1 decimal place.
      - \item Explain why $5.05$ and $5.04$ do not round to the same tenth.
      - \item A measurement is $3.276$ m. Write it to 2 decimal places.

