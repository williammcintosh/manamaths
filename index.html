<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mana Maths</title>
    <meta name="description" content="Mana Maths worksheet PDFs organised by learning objective." />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-brand">
          <img class="hero-logo" src="./header-logo.png" alt="Mana Maths jade twist logo" />
          <div class="hero-copy">
            <h1>Mana Maths</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <nav class="jump-links" aria-label="Learning objectives">
        <a href="#lo-yr9-equivalent-fractions">Equivalent Fractions</a>
        <a href="#lo-yr9-forming-fractions">Forming Fractions</a>
        <a href="#lo-yr9-multiplying-dividing-by-10-100-1000">Multiply/Divide by 10, 100, 1000</a>
      </nav>

      <section id="lo-yr9-equivalent-fractions" class="objective-section">
        <div class="section-heading">
          <h2>Equivalent Fractions</h2>
        </div>
        <div class="worksheet-grid">
          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Equivalent Fractions Foundation worksheet preview"
                src="./lo-yr9-equivalent-fractions/foundation-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Equivalent Fractions Proficient worksheet preview"
                src="./lo-yr9-equivalent-fractions/proficient-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Equivalent Fractions Excellence worksheet preview"
                src="./lo-yr9-equivalent-fractions/excellence-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>
        </div>
      </section>

      <section id="lo-yr9-forming-fractions" class="objective-section">
        <div class="section-heading">
          <h2>Forming Fractions</h2>
        </div>
        <div class="worksheet-grid">
          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Forming Fractions Foundation worksheet preview"
                src="./lo-yr9-forming-fractions/foundation-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Forming Fractions Proficient worksheet preview"
                src="./lo-yr9-forming-fractions/proficient-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Forming Fractions Excellence worksheet preview"
                src="./lo-yr9-forming-fractions/excellence-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>
        </div>
      </section>

      <section id="lo-yr9-multiplying-dividing-by-10-100-1000" class="objective-section">
        <div class="section-heading">
          <h2>Multiplying and Dividing by 10, 100, and 1000</h2>
        </div>
        <div class="worksheet-grid">
          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Multiplying and Dividing by 10, 100, and 1000 Foundation worksheet preview"
                src="./lo-yr9-multiplying-dividing-by-10-100-1000/foundation-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Multiplying and Dividing by 10, 100, and 1000 Proficient worksheet preview"
                src="./lo-yr9-multiplying-dividing-by-10-100-1000/proficient-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>

          <article class="worksheet-card">
            <div class="pdf-frame">
              <iframe
                title="Multiplying and Dividing by 10, 100, and 1000 Excellence worksheet preview"
                src="./lo-yr9-multiplying-dividing-by-10-100-1000/excellence-questions.pdf#toolbar=0&navpanes=0&scrollbar=1&view=Fit"
                loading="lazy"
              ></iframe>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
